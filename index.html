    --warn: #f0a500;
    --danger: #ff4d4d;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  .nav-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .nav-sub { font-size: 11px; color: var(--muted); }
  .nav-badge { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.25); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 1.5rem; overflow-x: auto; }
  .tab { padding: 14px 20px; font-size: 13px; cursor: pointer; border: none; background: transparent; color: var(--muted); border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.2s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  /* LAYOUT */
  .main { max-width: 860px; margin: 0 auto; padding: 1.5rem; }
  .section { display: none; }
  .section.active { display: block; }

  /* CARDS */
  .match-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; transition: border-color 0.2s; }
  .match-card:hover { border-color: var(--border2); }
  .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .match-meta { font-size: 12px; color: var(--muted); }
  .round-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: rgba(77,159,255,0.12); color: var(--blue); border: 1px solid rgba(77,159,255,0.2); }
  .finished-badge { background: rgba(255,255,255,0.06); color: var(--muted); border-color: var(--border); }

  /* TEAMS */
  .teams { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .team { text-align: center; flex: 1; }
  .team-flag { font-size: 32px; line-height: 1; margin-bottom: 6px; }
  .team-name { font-size: 15px; font-weight: 600; }
  .team-xg { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .vs-sep { color: var(--muted); font-size: 12px; padding: 0 1rem; }

  /* PROBS */
  .probs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .prob-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; }
  .prob-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .prob-val { font-size: 20px; font-weight: 700; }
  .prob-val.h { color: var(--accent); }
  .prob-val.d { color: var(--warn); }
  .prob-val.a { color: var(--danger); }

  /* EXTRA MARKETS */

  .market-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .market-val { font-size: 14px; font-weight: 600; }

  .signal.gris { background: var(--surface2); border-color: var(--border); color: var(--muted); }
  .signal-icon { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; }
  .signal-text { flex: 1; }
  .signal-text strong { color: var(--text); }
  .signal-ev { font-weight: 700; white-space: nowrap; font-size: 14px; }

  .add-pick-btn { width: 100%; padding: 9px; background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.25); color: var(--accent); border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; margin-bottom: 8px; transition: background 0.2s; }

  /* LOG TABLE */
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }

  .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.verde { background: rgba(0,229,160,0.12); color: var(--accent); }
  .badge.rojo { background: rgba(255,77,77,0.12); color: var(--danger); }
  .badge.pend { background: rgba(240,165,0,0.12); color: var(--warn); }
  .action-btn { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted); margin-right: 4px; transition: all 0.15s; }
  .action-btn:hover { color: var(--text); }

  /* PATTERNS */
  .patterns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .pattern-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .pattern-card h3 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .pattern-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); padding: 6px 0; border-bottom: 1px solid var(--border); }
  .pattern-row:last-child { border-bottom: none; }
  .pattern-row .val { font-weight: 600; color: var(--text); }
  .pattern-row .val.green { color: var(--accent); }
  .pattern-row .val.warn { color: var(--warn); }
  .analysis-box { background: var(--surface); border: 1px solid rgba(0,229,160,0.2); border-left: 3px solid var(--accent); border-radius: var(--radius-sm); padding: 1rem 1.25rem; margin-top: 1rem; font-size: 13px; color: var(--muted); line-height: 1.7; }
  .analysis-box strong { color: var(--text); }

  /* EMPTY */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* HEADER */
  .page-header { margin-bottom: 1.5rem; }
  .page-header h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .page-header p { font-size: 13px; color: var(--muted); }

  /* CLV INFO */
  .clv-info { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 1rem; font-size: 12px; color: var(--muted); }
  .clv-info strong { color: var(--accent); }

  /* ALERT BOX */
  .alert-config { background: var(--surface); border: 1px solid rgba(0,229,160,0.15); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.5rem; }
  .alert-config h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .alert-config p { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }
  .alert-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .threshold-display { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 12px; }

  @media (max-width: 600px) {
    .patterns-grid { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: repeat(2,1fr); }
    .inputs-grid { grid-template-columns: 1fr 1fr; }
    .probs { gap: 4px; }
    .prob-val { font-size: 16px; }
    .teams { gap: 0; }
    .team-flag { font-size: 26px; }
    .team-name { font-size: 13px; }
    .extra-markets { grid-template-columns: 1fr 1fr; }
  }
</style>

let picks = JSON.parse(localStorage.getItem('wc26v2_picks')||'[]');

// MODEL
function poisson(lam, k) {
  let p = Math.exp(-lam);
  for(let i=1;i<=k;i++) p*=lam/i;
  return p;
}
function calcProbs(m) {
  const avgG = 2.75;
  const lamH = avgG*(m.local.xgFor/1.5)*(m.visit.xgAg/1.0)*1.1;
  const lamA = avgG*(m.visit.xgFor/1.5)*(m.local.xgAg/1.0);
  let pH=0,pX=0,pA=0;
  const rho=-0.1;
  for(let i=0;i<=7;i++) for(let j=0;j<=7;j++) {
    let p=poisson(lamH,i)*poisson(lamA,j);
    if(i===0&&j===0) p*=(1-rho*lamH*lamA);
    else if(i===1&&j===0) p*=(1+rho*lamA);
    else if(i===0&&j===1) p*=(1+rho*lamH);
    else if(i===1&&j===1) p*=(1-rho);
    if(i>j) pH+=p; else if(i===j) pX+=p; else pA+=p;
  }
  const tot=pH+pX+pA;
  return {pH:pH/tot, pX:pX/tot, pA:pA/tot, lamH, lamA};
}
function calcOver(lamH,lamA,line) {
  let over=0;
  for(let i=0;i<=12;i++) for(let j=0;j<=12;j++) if(i+j>line) over+=poisson(lamH,i)*poisson(lamA,j);
  return Math.min(over,0.97);
}
function calcCards(m,line) {
  const lam=Math.min(m.arbAmar+(m.local.faltas+m.visit.faltas)/14,8);
  let over=0;
  for(let k=Math.ceil(line)+1;k<=15;k++) over+=poisson(lam,k);
  return Math.min(over,0.95);
}
function calcCorners(m) {
  const base=9+(m.local.xgFor+m.visit.xgFor)*1.5;
  return Math.min(base/16,0.7);
}
function ev(p,q){return((p*q)-1);}
function kelly(p,q){return Math.max(0,((q-1)*p-(1-p))/(q-1)*0.25);}
function getSignal(evv){
  if(evv>0.07) return {cls:'verde',ico:'▲',txt:'Valor alto'};
  if(evv>0.03) return {cls:'amarillo',ico:'~',txt:'Valor moderado'};
  if(evv>-0.02) return {cls:'gris',ico:'—',txt:'Sin valor claro'};
  return {cls:'rojo',ico:'▼',txt:'Sin valor'};
}

          <div class="input-group"><label>Cuota 1 (${m.local.name})</label><input type="number" id="c1_${m.id}" step="0.01" min="1.01" placeholder="1.80" oninput="evalMatch('${m.id}')"></div>
          <div class="input-group"><label>Cuota X (Empate)</label><input type="number" id="cx_${m.id}" step="0.01" min="1.01" placeholder="3.40" oninput="evalMatch('${m.id}')"></div>

          <div class="input-group"><label>Banco (COP)</label><input type="number" id="bk_${m.id}" step="10000" min="0" placeholder="100000" oninput="evalMatch('${m.id}')"></div>

}

function evalMatch(mid) {
  const m=MATCHES.find(x=>x.id===mid);
  const pr=calcProbs(m);
  const o25=calcOver(pr.lamH,pr.lamA,2.5);
  const cards=calcCards(m,3.5);
  const c1=parseFloat(document.getElementById('c1_'+mid)?.value)||0;
  const cx=parseFloat(document.getElementById('cx_'+mid)?.value)||0;
  const c2=parseFloat(document.getElementById('c2_'+mid)?.value)||0;
  const co25=parseFloat(document.getElementById('co25_'+mid)?.value)||0;
  const ct35=parseFloat(document.getElementById('ct35_'+mid)?.value)||0;
  const bk=parseFloat(document.getElementById('bk_'+mid)?.value)||0;
  const cont=document.getElementById('signals_'+mid);
  if(!cont) return;
  const checks=[
    {prob:pr.pH,cuota:c1,label:`1 — ${m.local.name} gana`,key:'1'},
    {prob:pr.pX,cuota:cx,label:`X — Empate`,key:'X'},
    {prob:pr.pA,cuota:c2,label:`2 — ${m.visit.name} gana`,key:'2'},
    {prob:o25,cuota:co25,label:`Over 2.5 goles`,key:'o25'},
    {prob:cards,cuota:ct35,label:`Over 3.5 tarjetas`,key:'ct35'},
  ];
  let html='';
  checks.forEach(ch=>{
    if(!ch.cuota||ch.cuota<1.01) return;
    const evv=ev(ch.prob,ch.cuota);
    const sig=getSignal(evv);
    const kf=kelly(ch.prob,ch.cuota);
    const stake=bk>0?Math.round(bk*kf):null;
    html+=`<div class="signal ${sig.cls}">
      <span class="signal-icon">${sig.ico}</span>
      <span class="signal-text"><strong>${ch.label}</strong> · Prob: ${(ch.prob*100).toFixed(0)}% · Cuota: ${ch.cuota.toFixed(2)}</span>
      <span class="signal-ev">${evv>=0?'+':''}${(evv*100).toFixed(1)}% EV</span>
    </div>`;
    if(stake&&evv>0.03) html+=`<div class="signal-kelly">Kelly 1/4 → Apuesta COP ${stake.toLocaleString('es-CO')}</div>`;
    if(evv*100>=alertThreshold) html+=`<button class="add-pick-btn" onclick="addPick('${mid}','${ch.key}','${ch.label.replace(/'/g,'&#39;')}',${ch.cuota},${ch.prob},${stake||0},${(evv*100).toFixed(1)})">+ Agregar a mis picks · EV +${(evv*100).toFixed(1)}%</button>`;
  });
  cont.innerHTML=html||'<div class="no-signals">Ingresa las cuotas para ver las señales</div>';
}

function addPick(mid,key,label,cuota,prob,stake,evv) {
  const m=MATCHES.find(x=>x.id===mid);
  picks.push({
    id:Date.now(), partido:`${m.local.flag} ${m.local.name} vs ${m.visit.name} ${m.visit.flag}`,
    fecha:m.date, apuesta:label, cuota:parseFloat(cuota.toFixed(2)),
    probModelo:(prob*100).toFixed(0)+'%', stake, evv:'+'+evv+'%', resultado:null
  });
  localStorage.setItem('wc26v2_picks',JSON.stringify(picks));
  switchTab('log');
}

function updateThreshold(v) {
  alertThreshold=parseFloat(v);
  localStorage.setItem('wc26v2_threshold',alertThreshold);
  document.getElementById('thres-display').textContent=alertThreshold+'%';
  document.getElementById('thres-status').textContent=alertThreshold+'%';
}

// LOG

  const cont=document.getElementById('tab-log');
  const g=picks.filter(p=>p.resultado==='ganado').length;
  const pe=picks.filter(p=>p.resultado==='perdido').length;
  const pend=picks.filter(p=>!p.resultado).length;
  const roi=picks.length>0?((g/picks.filter(p=>p.resultado).length||0)*100).toFixed(0)+'%':'—';
  if(!picks.length){
    cont.innerHTML=`<div class="page-header"><h2>Mis picks</h2><p>Registro de apuestas y seguimiento de CLV</p></div><div class="empty"><div class="empty-icon">📋</div><p>Todavía no tienes picks guardados.<br>Ve a Partidos, ingresa las cuotas y el sistema te muestra dónde hay valor.</p></div>`;

  }
  cont.innerHTML=`
    <div class="page-header"><h2>Mis picks</h2><p>Historial de apuestas · mide si el modelo tiene borde real</p></div>
    <div class="clv-info">⚡ <strong>CLV:</strong> si tus picks tienen EV positivo y el resultado a largo plazo es ganador, el modelo está calibrado. Necesitas mínimo 50 picks para sacar conclusiones estadísticas.</div>

          <td><div style="font-weight:600;font-size:13px">${p.partido}</div><div style="font-size:11px;color:var(--muted)">${p.fecha}${p.stake?' · COP '+p.stake.toLocaleString('es-CO'):''}</div></td>

function markR(i,res){ picks[i].resultado=res; localStorage.setItem('wc26v2_picks',JSON.stringify(picks)); renderLog(); }
function delPick(i){ picks.splice(i,1); localStorage.setItem('wc26v2_picks',JSON.stringify(picks)); renderLog(); }
function exportPicks(){
  const blob=new Blob([JSON.stringify(picks,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='wc26_picks.json'; a.click();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='patrones') renderPatrones();
  else if(name==='alertas') renderAlertas();
  else if(name==='log') renderLog();
}
